name: Ritual Monitor

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史计算时间

      - name: Generate Status
        run: |
          mkdir -p _site
          
          # 使用 Python 生成状态 JSON
          python3 << 'PYTHON'
          import os
          import json
          import subprocess
          from datetime import datetime

          # 扫描当前文件状态
          nodes = {}
          first_time = None
          last_time = None

          for i in range(1, 21):
              fname = f"start/{i:03d}.md"
              if os.path.exists(fname):
                  with open(fname, 'r') as f:
                      content = f.read().strip()
                  
                  # 获取该文件的最后修改信息
                  try:
                      log = subprocess.check_output(
                          ['git', 'log', '-1', '--format=%at|%an', '--', fname],
                          text=True
                      ).strip()
                      
                      if log and content != "WAITING":
                          timestamp, author = log.split('|')
                          ts = int(timestamp)
                          time_str = datetime.fromtimestamp(ts).strftime('%H:%M:%S')
                          
                          if not first_time or ts < first_time:
                              first_time = ts
                          if not last_time or ts > last_time:
                              last_time = ts
                          
                          nodes[f"{i:03d}"] = {
                              "status": "ONLINE",
                              "author": author,
                              "content": content,
                              "timestamp": ts,
                              "time_str": time_str
                          }
                      else:
                          nodes[f"{i:03d}"] = {"status": "WAITING"}
                  except Exception as e:
                      nodes[f"{i:03d}"] = {"status": "WAITING"}
              else:
                  nodes[f"{i:03d}"] = {"status": "MISSING"}

          # 计算耗时
          duration = last_time - first_time if (first_time and last_time) else 0

          status = {
              "total": 20,
              "online": sum(1 for n in nodes.values() if n.get("status") == "ONLINE"),
              "nodes": nodes,
              "first_commit": datetime.fromtimestamp(first_time).strftime('%Y-%m-%d %H:%M:%S') if first_time else None,
              "last_commit": datetime.fromtimestamp(last_time).strftime('%Y-%m-%d %H:%M:%S') if last_time else None,
              "duration_seconds": duration,
              "generated_at": datetime.now().isoformat()
          }

          with open('_site/status.json', 'w') as f:
              json.dump(status, f, indent=2)
          
          print(f"Status: {status['online']}/20 online, Duration: {duration}s")
          PYTHON

      - name: Copy frontend files
        run: |
          cp docs/index.html _site/
          cp -r start _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
